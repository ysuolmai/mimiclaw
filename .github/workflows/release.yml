name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build firmware
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          idf.py set-target esp32s3
          idf.py build

      - name: Prepare release artifacts
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          VERSION="${GITHUB_REF_NAME}"

          # Generate merged firmware for single-command flashing (includes SPIFFS)
          esptool.py --chip esp32s3 merge_bin \
            --flash_mode dio \
            --flash_freq 80m \
            --flash_size 4MB \
            -o "mimiclaw-esp32-s3-supermini-full-${VERSION}.bin" \
            0x0      build/bootloader/bootloader.bin \
            0x8000   build/partition_table/partition-table.bin \
            0x20000  build/mimiclaw.bin \
            0x340000 build/spiffs.bin

          # Copy individual binaries with version suffix
          cp build/mimiclaw.bin              "mimiclaw-esp32-s3-supermini-${VERSION}.bin"
          cp build/bootloader/bootloader.bin "bootloader-esp32-s3-supermini-${VERSION}.bin"
          cp build/partition_table/partition-table.bin "partition-table-esp32-s3-supermini-${VERSION}.bin"
          cp build/spiffs.bin                "spiffs-esp32-s3-supermini-${VERSION}.bin"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Flashing Guide

            ### 1. Merged firmware (easiest)

            Download `mimiclaw-esp32-s3-supermini-full-${{ github.ref_name }}.bin` and flash with a single command:

            ```bash
            esptool.py --chip esp32s3 -b 460800 write_flash 0x0 mimiclaw-esp32-s3-supermini-full-${{ github.ref_name }}.bin
            ```

            ### 2. Individual binaries (advanced)

            ```bash
            esptool.py --chip esp32s3 -b 460800 write_flash \
              0x0      bootloader-esp32-s3-supermini-${{ github.ref_name }}.bin \
              0x8000   partition-table-esp32-s3-supermini-${{ github.ref_name }}.bin \
              0x20000  mimiclaw-esp32-s3-supermini-${{ github.ref_name }}.bin \
              0x340000 spiffs-esp32-s3-supermini-${{ github.ref_name }}.bin
            ```

            ### 3. First-time setup

            After flashing, connect via serial (115200 baud) and configure:

            ```
            wifi <ssid> <password>
            tg_token <your-telegram-bot-token>
            api_key <your-anthropic-api-key>
            reboot
            ```
          files: |
            mimiclaw-esp32-s3-supermini-full-${{ github.ref_name }}.bin
            mimiclaw-esp32-s3-supermini-${{ github.ref_name }}.bin
            bootloader-esp32-s3-supermini-${{ github.ref_name }}.bin
            partition-table-esp32-s3-supermini-${{ github.ref_name }}.bin
            spiffs-esp32-s3-supermini-${{ github.ref_name }}.bin
