name: Build ESP32-C3 Super Mini Lite

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

jobs:
  idf-build-c3:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build firmware (ESP32-C3)
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"
          idf.py set-target esp32c3
          idf.py fullclean
          idf.py build

      - name: Create merged firmware image
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"
          # C3 lite merged firmware contains bootloader, partition table, and app.
          # Storage/SPIFFS stays separate, matching the Super Mini packaging style.
          esptool.py --chip esp32c3 merge_bin \
            --flash_mode dio \
            --flash_freq 40m \
            --flash_size 4MB \
            -o build/mimiclaw-esp32-c3-supermini-lite-merged.bin \
            0x0      build/bootloader/bootloader.bin \
            0x8000   build/partition_table/partition-table.bin \
            0x10000  build/mimiclaw.bin

      - name: Show image sizes
        if: always()
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"
          python "$IDF_PATH/tools/idf_size.py" build/mimiclaw.elf || true
          ls -lh build/*.bin build/bootloader/*.bin build/partition_table/*.bin || true

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mimiclaw-esp32-c3-supermini-lite-firmware
          path: |
            build/mimiclaw-esp32-c3-supermini-lite-merged.bin
            build/mimiclaw.bin
            build/spiffs.bin
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/flasher_args.json
            build/project_description.json
